<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion Admins</title>
</head>

<body>

    <h1>Connexion administrateurs</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Nom utilisateur"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Mot de passe"
               required>

        <br><br>

        <button type="submit">
            Connexion
        </button>

    </form>

</body>
</html>
